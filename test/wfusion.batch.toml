# wf-rules smoke test config.
#
# This config intentionally uses batch/file replay instead of TCP so it can be
# used as a deterministic availability check for the rule set.

mode = "batch"
sinks = "test/sinks"

[[sources]]
connect = "file_src"
name = "seed_conn_events"
path = "data/generated/port_scan_quick.jsonl"
stream = "conn_events"
data_format = "ndjson"

[runtime]
executor_parallelism = 4
rule_exec_timeout = "30s"
schemas = "models/schemas/*.wfs"
rules = "models/rules/01-recon/port_scan.wfl"

[window_defaults]
evict_interval = "30s"
max_window_bytes = "256MB"
max_total_bytes = "2GB"
evict_policy = "time_first"
watermark = "5s"
allowed_lateness = "30m"
late_policy = "drop"

[window.conn_events]
mode = "local"
max_window_bytes = "256MB"
over_cap = "30m"

[window.auth_events]
mode = "local"
max_window_bytes = "128MB"
over_cap = "10m"

[window.http_events]
mode = "local"
max_window_bytes = "128MB"
over_cap = "5m"

[window.dns_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "10m"

[window.network_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.security_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.http_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.dns_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.management_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.insider_alerts]
mode = "local"
max_window_bytes = "16MB"
over_cap = "0s"

[window.ad_change_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "30m"

[window.process_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "10m"

[window.data_access_events]
mode = "local"
max_window_bytes = "64MB"
over_cap = "10m"

[logging]
level = "info"
format = "plain"
file = "data/wfusion.log"
